spring:
  application:
    name: fruitshop

  datasource:
    url: jdbc:mysql://localhost:3307/fruitshop_db
    username: root
    password: 1234

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  logging:
    level:
      org:
        springframework:
          security: trace

  server:
    tomact:
      threads:
        max: 200
        min-spare: 5
